services:
  - type: web
    name: ocr-finance-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && python -m pip install -r requirements.txt
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: MONGODB_URI
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TOKEN_TTL_SECONDS
        value: 43200
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_COMMAND
        value: python
      - key: PDF_RENDER_DPI
        value: 200
      - key: PDF_MAX_PAGES
        value: 5

  - type: web
    name: ocr-finance-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
