services:
  - type: web
    name: ocr-finance-backend
    runtime: docker
    rootDir: backend
    plan: starter
    dockerfilePath: Dockerfile
    dockerContext: .
    dockerCommand: ./scripts/render-start.sh
    disk:
      name: ocr-finance-backend-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: MONGODB_URI
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TOKEN_TTL_SECONDS
        value: 43200
      - key: CORS_ORIGINS
        sync: false
      - key: STORAGE_BACKEND
        value: persistent-local
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: OUTPUT_DIR
        value: /var/data/outputs
      - key: LOCAL_UPLOAD_RETENTION_DAYS
        value: 30
      - key: LOCAL_OUTPUT_RETENTION_DAYS
        value: 7
      - key: LOCAL_STORAGE_CLEANUP_INTERVAL_MS
        value: 21600000
      - key: PYTHON_COMMAND
        value: python3
      - key: PDF_RENDER_DPI
        value: 200
      - key: PDF_MAX_PAGES
        value: 5
      - key: MALWARE_SCAN_COMMAND
        value: clamscan
      - key: MALWARE_SCAN_ARGS
        value: --no-summary,--infected
      - key: MALWARE_SCAN_TIMEOUT_MS
        value: 30000

  - type: web
    name: ocr-finance-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
